<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="module" src="./app.ts"></script>
    <style>
      body {
        width: 100%;
        height: 100%;
        min-height: 100lvh;
        margin: 0;
        background-color: beige;
      }
      #main-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #logs {
        position: absolute;
        top: 0;
        right: 0;
        font-family: monospace;
      }
      #timeline {
        position: absolute;
        bottom: 12px;
        right: 12px;
        left: 12px;
        width: calc(100% - 26px);
      }
    </style>
  </head>
  <body>
    <canvas id="main-canvas"></canvas>

    <pre id="logs"></pre>
  </body>
</html>
